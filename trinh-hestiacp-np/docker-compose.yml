version: "3.7"

services:
  # HestiaCP serves a self-signed HTTPS panel on 8083; Umbrel's app_proxy
  # validates upstream TLS and can't skip it, so we tunnel HTTP->TLS via socat.
  app_proxy:
    environment:
      APP_HOST: trinh-hestiacp-np_sslproxy_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  sslproxy:
    image: alpine/socat:1.8.0.0@sha256:a6be4c0262b339c53ddad723cdd178a1a13271e1137c65e27f90a08c16de02b8
    restart: on-failure
    command:
      - "TCP-LISTEN:8080,fork,reuseaddr"
      - "OPENSSL-CONNECT:trinh-hestiacp-np_hestia_1:8083,verify=0"

  hestia:
    # Non-privileged, multi-arch HestiaCP image (built in ptrinh/hestiacp-docker).
    image: ghcr.io/ptrinh/hestiacp@sha256:3e0be6baaff4bb2523e278857922894f2857bb95c58c614e3a44a5535864a5c5
    restart: on-failure
    stop_grace_period: 1m
    # No privileged, no cgroup host, no extra caps.
    environment:
      - TZ=UTC
    volumes:
      - hestia_home:/home
      - hestia_usr:/usr
      - hestia_etc:/etc
      - hestia_var:/var
      - hestia_backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "curl -k -sf https://localhost:8083/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 5m

volumes:
  hestia_home:
  hestia_usr:
  hestia_etc:
  hestia_var:
  hestia_backup:
