version: "3.7"

# Mirrors the official-store hestiacp app config (bind mounts + alt ports) so
# this community entry validates the submission on a real Umbrel.
services:
  app_proxy:
    environment:
      APP_HOST: trinh-hestiacp-np_sslproxy_1
      APP_PORT: 8081
      PROXY_AUTH_ADD: "false"

  sslproxy:
    image: alpine/socat:1.8.0.0@sha256:a6be4c0262b339c53ddad723cdd178a1a13271e1137c65e27f90a08c16de02b8
    restart: on-failure
    command:
      - "TCP-LISTEN:8081,fork,reuseaddr"
      - "OPENSSL-CONNECT:trinh-hestiacp-np_hestia_1:8083,verify=0"

  hestia:
    image: ghcr.io/ptrinh/hestiacp:build-28312998327@sha256:d50994871f199e3bb283ef857ef300e164eb2bbce01d611955f77136c316a974
    restart: on-failure
    stop_grace_period: 1m
    environment:
      - TZ=UTC
      - APP_PASSWORD=${APP_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/data/home:/home
      - ${APP_DATA_DIR}/data/mysql:/var/lib/mysql
      - ${APP_DATA_DIR}/data/postgresql:/var/lib/postgresql
      - ${APP_DATA_DIR}/data/hestia:/usr/local/hestia/data
      - ${APP_DATA_DIR}/data/hestia-conf:/usr/local/hestia/conf
      - ${APP_DATA_DIR}/data/backup:/backup
    ports:
      - "8088:80"
      - "8448:443"
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/local/hestia/data/.admin-password-set && curl -k -fs https://localhost:8083/login/ | grep -q 'name=.user.' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 5m
