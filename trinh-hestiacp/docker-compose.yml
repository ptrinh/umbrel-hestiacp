version: "3.7"

services:
  # Umbrel reverse-proxy in front of the HestiaCP web UI.
  # HestiaCP only serves its panel over HTTPS with a self-signed certificate on
  # port 8083. Umbrel's app_proxy validates upstream TLS and has no way to skip
  # it, so it can't talk to HestiaCP directly. Instead we point the proxy at a
  # small socat sidecar (plain HTTP) that transparently wraps the connection in
  # TLS to HestiaCP, ignoring the self-signed cert. PROXY_AUTH_ADD is disabled
  # because HestiaCP has its own login.
  app_proxy:
    environment:
      APP_HOST: trinh-hestiacp_sslproxy_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  # TLS-tunnel sidecar: listens on plain HTTP :8080 and forwards every byte to
  # HestiaCP's HTTPS :8083, terminating/originating TLS with cert verification
  # off. Transparent stream tunnel, so HestiaCP still sees a real HTTPS request
  # (no scheme/redirect/Host issues). Multi-arch and unprivileged.
  sslproxy:
    image: alpine/socat:1.8.0.0@sha256:a6be4c0262b339c53ddad723cdd178a1a13271e1137c65e27f90a08c16de02b8
    restart: on-failure
    command:
      - "TCP-LISTEN:8080,fork,reuseaddr"
      - "OPENSSL-CONNECT:trinh-hestiacp_hestia_1:8083,verify=0"

  hestia:
    image: smied/hestia-cp:latest@sha256:72fde6efa9ca479710d332c2c6b896b2a6641db1c5ea21a1302c5091340b42a6
    restart: on-failure
    stop_grace_period: 1m
    # HestiaCP manages system services (nginx/apache/exim/dovecot/bind/fail2ban)
    # and the firewall, so it runs systemd inside a privileged container.
    privileged: true
    cgroup: host
    hostname: hestia.umbrel.local
    environment:
      - TZ=UTC
    volumes:
      - hestia_home:/home
      - hestia_usr:/usr
      - hestia_etc:/etc
      - hestia_var:/var
      - hestia_backup:/backup
      - /sys/fs/cgroup:/sys/fs/cgroup
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    healthcheck:
      test: ["CMD-SHELL", "curl -k -sf https://localhost:8083/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 5m

volumes:
  hestia_home:
  hestia_usr:
  hestia_etc:
  hestia_var:
  hestia_backup:
